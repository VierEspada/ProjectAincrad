<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>武器詳細</title>
  <link rel="stylesheet" href="weapond.css">
</head>
<body>

  <!-- 戻るボタン -->
  <div class="top-bar">
    <a href="weapons.html" class="back-btn">← 戻る</a>
  </div>

  <div class="container">

    <!-- 左：画像 -->
    <div class="left">
      <img src="Bronze Mace.png" alt="武器画像" class="weapon-img">
    </div>

    <!-- 右：詳細 -->
    <div class="right">
      <h1 class="weapon-name">Bronze Mace</h1>

      <table class="weapon-table">
        <tr><td>武器名</td><td>Bronze Mace</td></tr>
        <tr><td>必要なレベル</td><td>1</td></tr>
        <tr><td>攻撃力</td><td>10.4-16</td></tr>
        <tr><td>買値</td><td>420 Col</td></tr>
        <tr><td>売値</td><td>210 Col</td></tr>
        <tr><td>攻撃方法</td><td>Blunt</td></tr>
        <tr><td>武器の種類</td><td>One Handed/Mace</td></tr>
        <tr><td>長さ</td><td>Average-0.58m</td></tr>
        <tr><td>重さ</td><td>2</td></tr>
        <tr><td>Strength</td><td>0</td></tr>
        <tr><td>Agility</td><td>0</td></tr>
        <tr><td>Unbreakable</td><td>Yes</td></tr>
        <tr><td>Tradeable</td><td>Yes</td></tr>
        <tr><td>スキン</td><td>None</td></tr>
      </table>
    </div>

  </div>

  <!-- 説明 -->
  <div class="description">
    <h2>詳細</h2>
    <p>

    </p>
  </div>

</body>
</html>
