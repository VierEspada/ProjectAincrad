<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>アイテム詳細</title>

  <link rel="stylesheet" href="items.css">

  <style>
    body {
      background: #05070d;
      color: #bfffea;
      margin: 0;
      font-family: sans-serif;
    }

    /* 全体レイアウト */
    .container {
      display: flex;
      gap: 20px;
      padding: 30px;
    }

    /* 画像 */
    .item-img {
      width: 100%;
      max-width: 300px;
      border: 1px solid rgba(0, 255, 200, 0.4);
      box-shadow: 0 0 12px rgba(0,255,200,0.2);
      background: rgba(0, 20, 30, 0.4);
    }

    /* 右側 */
    .right {
      flex: 1;
    }

    .item-name {
      color: #00ffcc;
      text-shadow: 0 0 8px #00ffcc;
    }

    /* 表 */
    .item-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    .item-table td {
      padding: 8px;
      border-bottom: 1px solid rgba(0,255,200,0.2);
    }

    /* 説明 */
    .description {
      padding: 0 30px 30px 30px;
    }

    /* マップ */
    .map-panel {
      margin-top: 30px;
      padding: 15px;
      border: 1px solid rgba(0, 255, 200, 0.6);
      background: rgba(0, 20, 30, 0.6);
      box-shadow: 0 0 15px rgba(0,255,200,0.2);
    }

    .map-panel h2 {
      color: #00ffcc;
      text-shadow: 0 0 8px #00ffcc;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .map-img {
      width: 100%;
      height: 350px;
      object-fit: cover;
      border: 1px solid rgba(0,255,200,0.4);
      box-shadow: 0 0 10px rgba(0,255,200,0.2);
      filter: hue-rotate(140deg) brightness(1.2) contrast(1.3);
    }

    /* 戻るボタン */
    .top-bar {
      padding: 15px 30px;
    }

    .back-btn {
      color: #00ffcc;
      text-decoration: none;
    }

    .back-btn:hover {
      text-shadow: 0 0 10px #00ffcc;
    }
  </style>
</head>

<body>

<!-- 戻る -->
<div class="top-bar">
  <a href="item.html" class="back-btn">← アイテム一覧へ</a>
</div>

<!-- メイン -->
<div class="container">

  <!-- 左：画像 -->
  <div class="left">
    <img src="Green Herb.png"
         alt="Green Herb"
         class="item-img"
         onerror="this.onerror=null;this.src='no-image.png';">
  </div>

  <!-- 右：情報 -->
  <div class="right">
    <h1 class="item-name">Green Herb</h1>

    <table class="item-table">
      <tr><td>買値</td><td>採取</td></tr>
      <tr><td>売値</td><td>5 Col</td></tr>
      <tr><td>スタック数</td><td>64</td></tr>
      <tr><td>トレード可能</td><td>可能</td></tr>
    </table>
  </div>

</div>

<!-- 説明 -->
<div class="description">

  <h2>詳細</h2>
  <p>
    マップ内で採取する。<br>
    クエストで使用する。<br>
    入手方法：マップ内採取
  </p>

  <!-- マップ（PNG） -->
  <div class="map-panel">
    <h2>採取エリア</h2>
    <img src="Green HerbM1.png" alt="map" class="map-img">
  </div>

</div>

</body>
</html>
