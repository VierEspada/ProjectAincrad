<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>アイテム詳細 - Green Herb</title>

  <!-- 外部CSSのみ使用 -->
  <link rel="stylesheet" href="items.css">
</head>

<body>

<!-- 戻る -->
<div class="top-bar">
  <a href="item.html" class="back-btn">← アイテム一覧へ</a>
</div>

<!-- メイン -->
<div class="container">

  <!-- 左：画像 -->
  <div class="left">
    <img src="Green Herb.png"
         alt="Green Herb"
         class="item-img"
         onerror="this.onerror=null;this.src='no-image.png';">
  </div>

  <!-- 右：情報 -->
  <div class="right">
    <h1 class="item-name">Green Herb</h1>

    <table class="item-table">
      <tr><td>買値</td><td>採取</td></tr>
      <tr><td>売値</td><td>5 Col</td></tr>
      <tr><td>スタック数</td><td>64</td></tr>
      <tr><td>トレード可能</td><td>可能</td></tr>
    </table>
  </div>

</div>

<!-- 説明 -->
<div class="description">

  <h2>詳細</h2>
  <p>
    マップ内で採取する。<br>
    クエストで使用する。<br>
    入手方法：マップ内採取
  </p>

  <!-- マップ -->
  <div class="map-panel">
    <h2>採取エリア</h2>
    <img src="Green HerbM1.png"
         alt="map"
         class="map-img"
         onerror="this.onerror=null;this.src='no-image.png';">
  </div>

</div>

</body>
</html>
