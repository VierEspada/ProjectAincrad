<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ink Nepenthes</title>

  <link rel="stylesheet" href="monster.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

  <!-- ヘッダー -->
  <h1 class="title">Ink Nepenthes</h1>

  <!-- 基本情報 -->
  <div class="card info">

    <img src="Ink Nepenthes.png" alt="Ink Nepenthes">

    <div class="info-text">

      <p class="desc">
        戦闘にかなりなれたプレイヤーが戦う敵。<br>
        イノシシや蜂と違ってプレイヤーが攻撃しなくても近づいたら敵対する。
      </p>

      <!-- ステータス -->
      <div class="stats">
        <div>EXP: 175</div>
        <div>Col: 80</div>
      </div>

      <!-- ドロップ -->
      <div class="drop-text">
        item Drop:
        <br>
        
      </div>

    </div>
  </div>

  <!-- 出現場所 -->
  <div class="card map">
    <h2>主な出現場所</h2>
    <p>MAP</p>
    <img src="Ink NepenthesM1.png" alt="Map">
  </div>

  <!-- 戦闘情報 -->
  <div class="card battle">
    <h2>攻撃方法</h2>

    <details>
      <summary>叩きつけ</summary>
      <p>右手を前方に振り下ろして攻撃をする。ノックバックあり。</p>

      <video controls>
        <source src="NepenthesATK1.mp4" type="video/mp4">
      </video>
    </details>

    <details>
      <summary>左右薙ぎ払い</summary>
      <p>左右の手で順番に前方を薙ぎ払う攻撃。ノックバックあり。</p>

      <video controls>
        <source src="NepenthesATK2.mp4" type="video/mp4">
      </video>
    </details>

    <details>
      <summary>回転攻撃</summary>
      <p>1回転して周囲のプレイヤーに攻撃をする。やや大きめのノックバックあり。</p>

      <video controls>
        <source src="NepenthesATK3.mp4" type="video/mp4">
      </video>
    </details>

    <details>
      <summary>接触ダメージ</summary>
      <p>本体に接触するとダメージをうけ吹き飛ばされる。かなり大きめのノックバックあり。</p>

      <video controls>
        <source src="NepenthesATK4.mp4" type="video/mp4">
      </video>
    </details>

    

  </div>

  <!-- 戻るボタン（追加・便利） -->
  <div class="card back">
    <a href="monstera.html">← モンスター 一覧へ戻る</a>
  </div>

</div>

</body>
</html>
