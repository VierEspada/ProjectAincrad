<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>アイテム詳細</title>
  <link rel="stylesheet" href="items.css">
</head>
<body>
<!-- 戻るボタン -->
<div class="top-bar">
  <a href="item.html" class="back-btn">← アイテム一覧へ</a>
</div>
  <div class="container">

    <!-- 左：画像（自動差し替え） -->
    <div class="left">
      <img src="Lantern.png"
           alt="アイテム画像"
           class="item-img"
           onerror="this.onerror=null;this.src='no-image.png';">
    </div>

    <!-- 右：詳細 -->
    <div class="right">
      <h1 class="item-name">Lantern</h1>

      <table class="item-table">
        <tr><td>買値</td><td>2500 Col</td></tr>
        <tr><td>売値</td><td>1250 Col</td></tr>
        <tr><td>スタック数</td><td>1</td></tr>
        <tr><td>トレード可能</td><td>可能</td></tr>
      </table>
    </div>

  </div>

  <!-- 説明 -->
  <div class="description">
    <h2>詳細</h2>
    <p>
      周りを照らすことができるランタン<br>
      入手方法<br>
      ショップ<br>
      
    </p>
  </div>

</body>
</html>
