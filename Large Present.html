<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>アイテム詳細</title>
  <link rel="stylesheet" href="items.css">
</head>
<body>
<!-- 戻るボタン -->
<div class="top-bar">
  <a href="item.html" class="back-btn">← アイテム一覧へ</a>
</div>
  <div class="container">

    <!-- 左：画像（自動差し替え） -->
    <div class="left">
      <img src="Large Present.png"
           alt="アイテム画像"
           class="item-img"
           onerror="this.onerror=null;this.src='no-image.png';">
    </div>

    <!-- 右：詳細 -->
    <div class="right">
      <h1 class="item-name">Large Present</h1>

      <table class="item-table">
        <tr><td>買値</td><td> Christmas Event item </td></tr>
        <tr><td>売値</td><td>0 Col</td></tr>
        <tr><td>スタック数</td><td>255</td></tr>
        <tr><td>トレード</td><td>不可</td></tr>
      </table>
    </div>

  </div>

  <!-- 説明 -->
  <div class="description">
    <h2>詳細</h2>
    <p>
     開封するとランダムなアイテムが手に入る。<br>
      入手方法<br>
      <a href="Medium Present.html" class="item-link">Medium Present</a>を10個で
      <a href="Large Present.html" class="item-link">Large Present</a>を1個に合成できる。<br>
      開けて出るもの
     <a href=".html" class="item-link"></a>
    </p>
  </div>

</body>
</html>
