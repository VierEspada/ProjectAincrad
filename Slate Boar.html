<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slate Boar</title>

  <link rel="stylesheet" href="monster.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

  <!-- ヘッダー -->
  <h1 class="title">Slate Boar</h1>

  <!-- 基本情報 -->
  <div class="card info">

    <img src="Slate Boar.png" alt="Slate Boar">

    <div class="info-text">

      <p class="desc">
        <a href="Frenzy Boar.html" class="monster-link">Frenzy Boar</a>より少し強い敵。
        <br>
        攻撃方法は<a href="Frenzy Boar.html" class="monster-link">Frenzy Boar</a>と同じ。
      </p>

      <!-- ステータス -->
      <div class="stats">
        <div>EXP: 75</div>
        <div>Col: 50</div>
      </div>

      <!-- ドロップ -->
      <div class="drop-text">
        item Drop:<br>
        <a href="Quartanier.html" class="weapon-link">Quartanier</a>(低確率)
        
      </div>

    </div>
  </div>

  <!-- 出現場所 -->
  <div class="card map">
    <h2>主な出現場所</h2>
    <p>MAP</p>
    <img src="Slate BoarM1.png" alt="Map">
  </div>

  <!-- 戦闘情報 -->
  <div class="card battle">
    <h2>攻撃方法</h2>

    <details>
      <summary>頭突き1</summary>
      <p>プレイヤーが近づくと吹き飛ばす攻撃を行う。後方へノックバックあり。</p>

      <video controls>
        <source src="Frenzy BoarATK1.mp4" type="video/mp4">
      </video>
    </details>

    <details>
      <summary>頭突き2</summary>
      <p>一歩前に出て突進する攻撃。上方向へノックバックあり。</p>

      <video controls>
        <source src="Frenzy BoarATK2.mp4" type="video/mp4">
      </video>
    </details>

    <details>
      <summary>後退→突進</summary>
      <p>一度距離を取り、振り向いてから突進する攻撃。</p>

      <video controls>
        <source src="Frenzy BoarATK3.mp4" type="video/mp4">
      </video>
    </details>

    <details>
      <summary>突進</summary>
      <p>距離があると突進してくる攻撃。</p>

      <video controls>
        <source src="Frenzy BoarATK4.mp4" type="video/mp4">
      </video>
    </details>

  </div>

  <!-- 戻るボタン（追加・便利） -->
  <div class="card back">
    <a href="monstera.html">← モンスター 一覧へ戻る</a>
  </div>

</div>

</body>
</html>
