<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wasp</title>

  <link rel="stylesheet" href="monster.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

  <!-- ヘッダー -->
  <h1 class="title">Wasp</h1>

  <!-- 基本情報 -->
  <div class="card info">

    <img src="Wasp.png" alt="Wasp">

    <div class="info-text">

      <p class="desc">
        
      </p>

      <!-- ステータス -->
      <div class="stats">
        <div>EXP: 60</div>
        <div>Col: 35</div>
      </div>

      <!-- ドロップ -->
      <div class="drop-text">
        item Drop:
        <br>
        
      </div>

    </div>
  </div>

  <!-- 出現場所 -->
  <div class="card map">
    <h2>主な出現場所</h2>
    <p>MAP</p>
    <img src="WaspM1.png" alt="Map">
  </div>

  <!-- 戦闘情報 -->
  <div class="card battle">
    <h2>攻撃方法</h2>

    <details>
      <summary>刺突-単発</summary>
      <p>プレイヤーに接近して、単発の突きを行う。</p>

      <video controls>
        <source src="WaspATK1.mp4" type="video/mp4">
      </video>
    </details>

    <details>
      <summary>刺突-4回</summary>
      <p>プレイヤーにやや速い速度で接近して、4発の突きを行う。</p>

      <video controls>
        <source src="WaspATK2.mp4" type="video/mp4">
      </video>
    </details>

    <details>
      <summary>毒</summary>
      <p>プレイヤーとの距離がある場合、毒を飛ばす遠距離攻撃をしてくる。</p>

      <video controls>
        <source src="WaspATK3.mp4" type="video/mp4">
      </video>
    </details>

  </div>

  <!-- 戻るボタン（追加・便利） -->
  <div class="card back">
    <a href="monstera.html">← モンスター 一覧へ戻る</a>
  </div>

</div>

</body>
</html>
