<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Weapon Detail</title>
  <link rel="stylesheet" href="weapond.css">
</head>
<body>

  <!-- 戻るボタン -->
  <div class="top-bar">
    <a href="weapons.html" class="back-btn">← Back</a>
  </div>

  <div class="container">

    <!-- 左：画像 -->
    <div class="left">
      <img src="Wooden Sword.png" alt="武器画像" class="weapon-img">
    </div>

    <!-- 右：詳細 -->
    <div class="right">
      <h1 class="weapon-name">Wooden Sword</h1>

      <table class="weapon-table">
        <tr><td>Name</td><td>Wooden Sword</td></tr>
        <tr><td>Required Level</td><td>0</td></tr>
        <tr><td>Attack</td><td>3.25-5</td></tr>
        <tr><td>Buy Price</td><td>25 Col</td></tr>
        <tr><td>Sell Value</td><td>50 Col</td></tr>
        <tr><td>Type</td><td>Blunt</td></tr>
        <tr><td>Category</td><td>One Handed/Sword</td></tr>
        <tr><td>Range</td><td>Average-0.78m</td></tr>
        <tr><td>Weight</td><td>1</td></tr>
        <tr><td>Strength</td><td>0</td></tr>
        <tr><td>Agility</td><td>0</td></tr>
        <tr><td>Unbreakable</td><td>Yes</td></tr>
        <tr><td>Tradeable</td><td>Yes</td></tr>
        <tr><td>Skin</td><td>None</td></tr>
      </table>
    </div>

  </div>

  <!-- 説明 -->
  <div class="description">
    <h2>詳細</h2>
    <p>初期装備のうちの１つ。
      攻撃力は3.25-5とかなり低い。
      
    </p>
  </div>

</body>
</html>
