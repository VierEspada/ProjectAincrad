<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frenzy Boar</title>

  <link rel="stylesheet" href="monster.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

  <!-- ヘッダー -->
  <h1 class="title">Frenzy Boar</h1>

  <!-- 基本情報 -->
  <div class="card info">

    <img src="frenzyboar.png" alt="Frenzy Boar">

    <div class="info-text">

      <p class="desc">
        狂暴化した猪型モンスター。突進攻撃が非常に危険で、接近戦では注意が必要。
      </p>

      <!-- ステータス -->
      <div class="stats">
        <div>EXP: 50</div>
        <div>Col: 20</div>
      </div>

      <!-- ドロップ -->
      <div class="drop-text">
        item Drop:
        <br>
        
      </div>

    </div>
  </div>

  <!-- 出現場所 -->
  <div class="card map">
    <h2>主な出現場所</h2>
    <p>MAP</p>
    <img src="frenzyboarM1.png" alt="Map">
  </div>

  <!-- 戦闘情報 -->
  <div class="card battle">
    <h2>攻撃方法</h2>

    <details>
      <summary>頭突き1</summary>
      <p>プレイヤーが近づくと吹き飛ばす攻撃を行う。後方へノックバックあり。</p>

      <video controls>
        <source src="frenzyboarATK1.mp4" type="video/mp4">
      </video>
    </details>

    <details>
      <summary>頭突き2</summary>
      <p>一歩下がってから突進する攻撃。上方向へノックバックあり。</p>

      <video controls>
        <source src="frenzyboarATK2.mp4" type="video/mp4">
      </video>
    </details>

    <details>
      <summary>後退→突進</summary>
      <p>一度距離を取り、振り向いてから突進する攻撃。</p>

      <video controls>
        <source src="frenzyboarATK3.mp4" type="video/mp4">
      </video>
    </details>

    <details>
      <summary>突進</summary>
      <p>距離があると高速で突進してくる攻撃。</p>

      <video controls>
        <source src="frenzyboarATK4.mp4" type="video/mp4">
      </video>
    </details>

  </div>

  <!-- 戻るボタン（追加・便利） -->
  <div class="card back">
    <a href="monstera.html">← モンスター 一覧へ戻る</a>
  </div>

</div>

</body>
</html>
